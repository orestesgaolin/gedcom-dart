name: Dart CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: dart-lang/setup-dart@v1

      - name: Install Dependencies
        run: dart pub get

      - name: Format
        run: dart format --set-exit-if-changed .

      - name: Analyze
        run: dart analyze --fatal-infos --fatal-warnings lib

      - name: Run tests
        run: dart test --coverage=coverage && dart run coverage:format_coverage --lcov
          --in=coverage --out=coverage/lcov.info --packages=.packages
          --report-on=lib
