name: gedcom
description: Dart library to parse GEDCOM data from string input ported from
  popular Python library
version: 0.4.0
repository: https://github.com/orestesgaolin/gedcom-dart
topics: 
  - genealogy
  - gedcom
  - parser
  - family-tree

environment:
  sdk: ">=3.2.6 <4.0.0"

executables:
  gedcom_to_mermaid:

dependencies:
  collection: ^1.15.0
  meta: ^1.3.0

dev_dependencies:
  coverage: ^1.0.2
  test: ^1.17.2
  very_good_analysis: ^6.0.0
